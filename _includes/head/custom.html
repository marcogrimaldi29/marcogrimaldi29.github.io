<!-- ── Link target logic ──────────────────────────────────
  Rules (evaluated in order):
    1. In-page anchors (#…) and javascript: links → no action
    2. Different hostname (truly external site) → new tab
    3. Same hostname, pathname starts with THIS repo's baseurl
       (e.g. /az-305-study-notes/) → same tab (internal nav)
    4. Same hostname, different path prefix
       (e.g. /az-305-messaging/ from within az-305-study-notes)
       → new tab (cross-repo link)

  The repo baseurl is injected by Jekyll/Liquid at build time
  so each repo gets the correct value automatically — no manual
  changes needed when copying this file across repos.
───────────────────────────────────────────────────────── -->
<script>
(function () {
  // Injected by Jekyll at build time from _config.yml → baseurl.
  // e.g. "/az-305-study-notes" — strip any trailing slash for
  // safe prefix matching below.
  var REPO_BASE = "{{ site.baseurl }}".replace(/\/$/, "");

  function applyLinkTargets() {
    document.querySelectorAll("a[href]").forEach(function (link) {
      var href = link.getAttribute("href") || "";

      // Rule 1 — never touch in-page anchors or javascript: links.
      if (href.startsWith("#") || href.startsWith("javascript:")) {
        return;
      }

      // Rule 2 — different hostname → external site → new tab.
      // Browsers resolve link.hostname for both absolute and
      // relative hrefs, so this works for all href formats.
      if (link.hostname !== window.location.hostname) {
        link.setAttribute("target", "_blank");
        link.setAttribute("rel",    "noopener noreferrer");
        return;
      }

      // Rules 3 & 4 — same hostname.
      // Check whether the link's pathname falls inside THIS repo.
      // link.pathname is always the resolved absolute path, e.g.:
      //   /az-305-study-notes/01-identity-governance-monitoring/
      var pathname = link.pathname || "";

      var isSameRepo =
        REPO_BASE === "" ||                          // root-deployed repo
        pathname === REPO_BASE ||                    // exact baseurl match
        pathname.startsWith(REPO_BASE + "/");        // page inside this repo

      if (!isSameRepo) {
        // Rule 4 — same hostname but a different repo path → new tab.
        link.setAttribute("target", "_blank");
        link.setAttribute("rel",    "noopener noreferrer");
      }
      // Rule 3 — same repo → do nothing, browser default (same tab).
    });
  }

  // Guard against the script loading after DOMContentLoaded has
  // already fired (can happen with async/deferred injection).
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", applyLinkTargets);
  } else {
    applyLinkTargets();
  }
})();
</script>
